version: '3.8'

services:
  # Local LLM Core Service
  ollama:
    image: ollama/ollama:latest
    container_name: apex_ollama
    volumes:
      - ./shared/models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  # Core API Server Gateway
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apex_backend
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - ollama

  # React Frontend Microservice
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apex_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  # FFmpeg Processing Worker Engine
  video_engine:
    build:
      context: ./video_engine
      dockerfile: Dockerfile
    container_name: apex_video_engine
    volumes:
      - ./shared:/app/shared
    restart: unless-stopped

  # Whisper & TTS Processing Engine
  voice_engine:
    build:
      context: ./voice_engine
      dockerfile: Dockerfile
    container_name: apex_voice_engine
    volumes:
      - ./shared:/app/shared
    restart: unless-stopped

  # LLM Execution & Agentic Workflows Service
  workflow_engine:
    build:
      context: ./workflow_engine
      dockerfile: Dockerfile
    container_name: apex_workflow_engine
    volumes:
      - ./shared:/app/shared
    restart: unless-stopped
    depends_on:
      - ollama
